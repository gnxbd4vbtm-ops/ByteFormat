<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5a5aff"/>
      <stop offset="100%" stop-color="#2c2cff"/>
    </linearGradient>

    <!-- Inner gradient -->
    <linearGradient id="inner" x1="16" y1="16" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a3aff"/>
      <stop offset="100%" stop-color="#1f1fff"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Outer rounded background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Inner panel -->
  <rect x="16" y="16" width="96" height="96" rx="20" fill="url(#inner)" filter="url(#shadow)"/>

  <!-- Letter -->
  <text
    x="50%"
    y="50%"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="Segoe UI, Inter, Arial, sans-serif"
    font-size="64"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-2"
  >
    B
  </text>
</svg>